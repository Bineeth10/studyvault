<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - StudyVault</title>
    <script src="/static/js/theme_toggle.js"></script>
    <link rel="stylesheet" href="/static/css/theme_toggle.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        body.dark-mode {
            background: linear-gradient(-45deg, #1e1b4b, #312e81, #1e293b, #0f172a) !important;
            background-size: 400% 400%;
        }

        .container {
            background: var(--card-bg, white);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            max-width: 450px;
            width: 100%;
            transition: background-color 0.3s, color 0.3s;
        }

        .lock-icon {
            text-align: center;
            font-size: 3em;
            margin-bottom: 10px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        h1 {
            color: var(--text-color, #333);
            font-size: 1.75em;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: var(--text-muted, #666);
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.95em;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: var(--text-color, #333);
            font-weight: 600;
            margin-bottom: 8px;
        }

        input[type="email"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border-color, #e0e0e0);
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
            background-color: var(--input-bg, #fff);
            color: var(--text-color, #333);
        }

        input[type="email"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.05em;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            margin-top: 10px;
            letter-spacing: 0.3px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* ── Alert boxes ─────────────── */
        .alert {
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 0.92em;
            line-height: 1.5;
            margin-bottom: 18px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .alert-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
        }

        .alert-success {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #15803d;
        }

        .alert-icon {
            font-size: 1.15em;
            flex-shrink: 0;
            margin-top: 1px;
        }

        /* ── Bottom links ────────────── */
        .links-row {
            text-align: center;
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .links-row a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95em;
            transition: color 0.2s;
        }

        .links-row a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .separator {
            color: var(--text-muted, #999);
            font-size: 0.85em;
        }

        /* Loading state */
        .btn-submit.loading {
            opacity: 0.8;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="lock-icon">🔑</div>
        <h1>Forgot Password?</h1>
        <p class="subtitle">
            Enter the email address linked to your account and we'll send you a reset link.
        </p>

        {% if error %}
        <div class="alert alert-error">
            <span class="alert-icon">❌</span>
            <div>{{ error }}</div>
        </div>
        {% endif %}

        {% if success %}
        <div class="alert alert-success">
            <span class="alert-icon">✅</span>
            <div>{{ success }}</div>
        </div>
        {% else %}
        <form action="/forgot-password" method="POST" id="forgotForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="you@example.com"
                    required
                    autocomplete="email"
                >
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                Send Reset Link
            </button>
        </form>
        {% endif %}

        <div class="links-row">
            <a href="/login">← Back to Login</a>
            <span class="separator">or</span>
            <a href="/roles">Go to Role Selection</a>
        </div>
    </div>

    <script>
        // Show loading state on submit
        const form = document.getElementById('forgotForm');
        const btn  = document.getElementById('submitBtn');
        if (form) {
            form.addEventListener('submit', () => {
                btn.textContent = 'Sending…';
                btn.classList.add('loading');
                btn.disabled = true;
            });
        }
    </script>
</body>

</html>
